name: PROTON Login Brute Force

on:
  repository_dispatch:
    types: [proton-run]

env:
  PYTHON_VERSION: '3.11'

jobs:
  proton-attack:
    name: PROTON Brute Force
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 🔍 Validate Authorization
        run: |
          if [[ "${{ github.event.client_payload.authorization }}" != "${{ secrets.PROTON_PAT_TOKEN }}" ]]; then
            echo "❌ Unauthorized: PAT token mismatch"
            exit 1
          fi
          echo "✅ Authorization validated"

      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 🌐 Install Google Chrome
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get remove -y google-chrome-stable chromium-browser chromium chromium-chromedriver 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb -O /tmp/chrome.deb
          sudo dpkg -i /tmp/chrome.deb || sudo apt-get install -f -y -qq
          google-chrome --version

      - name: 📦 Install Python dependencies
        shell: bash
        run: |
          pip install --quiet requests rich pyfiglet selenium pillow pytesseract undetected-chromedriver

      - name: 🔤 Install Tesseract OCR
        shell: bash
        run: |
          sudo apt-get install -y -qq tesseract-ocr

      - name: 🚀 Run PROTON
        shell: bash
        env:
          TARGET_URL: ${{ github.event.client_payload.target_url }}
          CREDS_B64: ${{ github.event.client_payload.creds_b64 }}
          RUN_ID: ${{ github.event.client_payload.run_id || github.run_id }}
        run: |
          python proton_runner.py
